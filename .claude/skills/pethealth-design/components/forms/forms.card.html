<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); color: var(--t1); }
  .glabel { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--t3); margin-bottom: 10px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; max-width: 320px; padding: 6px 0; }
  .toggle-label { font-size: 15px; font-weight: 600; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Input, Switch } = window.PetHealthAIDesignSystem_fd90ba;
    function Demo() {
      const [notif, setNotif] = React.useState(true);
      const [dark, setDark] = React.useState(false);
      return (
        <div style={{ display: 'flex', gap: 28, flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 280 }}>
            <div className="glabel">Inputs</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <Input icon="mail-outline" placeholder="Email" defaultValue="max@pethealth.ai" />
              <Input icon="lock-closed-outline" type="password" placeholder="Password" defaultValue="secret123" />
              <Input icon="search-outline" placeholder="Ask the assistant…" pill />
            </div>
          </div>
          <div style={{ flex: 1, minWidth: 240 }}>
            <div className="glabel">Switches</div>
            <div className="toggle-row"><span className="toggle-label">Notifications</span><Switch checked={notif} onChange={setNotif} /></div>
            <div className="toggle-row"><span className="toggle-label">Dark mode</span><Switch checked={dark} onChange={setDark} /></div>
            <div className="toggle-row"><span className="toggle-label" style={{ color: 'var(--t4)' }}>Sync (disabled)</span><Switch checked={false} disabled /></div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
