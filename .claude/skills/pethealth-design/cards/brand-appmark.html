<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-base); display: flex; gap: 16px; align-items: center; }
  .tile { width: 92px; height: 92px; border-radius: 22px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-2); overflow: hidden; flex: none; }
  .tile img { width: 100%; height: 100%; object-fit: cover; }
  .fg { width: 64px; height: 64px; object-fit: contain; }
  .note { font-size: 12px; color: var(--t2); max-width: 300px; }
  .note b { color: var(--t1); }
</style>
</head>
<body>
  <div class="tile" style="background:#EAF4FF;"><img src="../assets/icon.png" alt="app icon" /></div>
  <div class="tile" style="background: var(--surface);"><img class="fg" src="../assets/android-icon-foreground.png" alt="foreground mark" /></div>
  <div class="note"><b>Caret mark.</b> Soft, rounded, dimensional. Adaptive foreground sits on any tinted tile. Pair with the mint wordmark.</div>
</body>
</html>
