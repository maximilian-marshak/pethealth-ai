<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); display: flex; align-items: center; gap: 16px; }
  .mark { width: 52px; height: 52px; flex: none; }
  .word { font-size: 38px; font-weight: 700; color: var(--t1); letter-spacing: -0.5px; }
  .word .ai { color: var(--accent); }
  .sub { font-size: 13px; color: var(--t2); margin-top: 2px; }
</style>
</head>
<body>
  <img class="mark" src="../assets/icon.png" alt="PetHealthAI mark" />
  <div>
    <div class="word">PetHealth<span class="ai">AI</span></div>
    <div class="sub">Your pet's health companion</div>
  </div>
</body>
</html>
