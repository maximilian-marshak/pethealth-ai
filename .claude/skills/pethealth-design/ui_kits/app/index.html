<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PetHealthAI — App UI Kit</title>
<link rel="stylesheet" href="../../styles.css" />
<script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         padding: 32px; background: #eef4f1; }
  #root { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="AssistantScreens.jsx"></script>
<script type="text/babel" src="ActivityScreen.jsx"></script>
<script type="text/babel" src="MedicalScreen.jsx"></script>
<script type="text/babel" src="ProfileScreen.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState('dashboard');
  const [chat, setChat] = useState(null); // active chat category or null
  const [dark, setDark] = useState(false);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  }, [dark]);

  let body;
  if (!authed) {
    body = <LoginScreen onLogin={() => setAuthed(true)} />;
  } else if (chat) {
    body = <ChatScreen category={chat} onBack={() => setChat(null)} />;
  } else if (tab === 'dashboard') {
    body = <DashboardScreen onOpenAssistant={() => setTab('assistant')} />;
  } else if (tab === 'assistant') {
    body = <AssistantHubScreen onOpenChat={(c) => setChat(c)} />;
  } else if (tab === 'activity') {
    body = <ActivityScreen />;
  } else if (tab === 'medical') {
    body = <MedicalScreen />;
  } else {
    body = <ProfileScreen dark={dark} onToggleDark={setDark} />;
  }

  return (
    <PhoneFrame>
      <StatusBar dark={dark} />
      {body}
      {authed && !chat && <TabBar active={tab} onChange={(t) => { setTab(t); setChat(null); }} />}
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
